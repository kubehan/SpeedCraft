{{template "layout" .}}
{{define "content"}}
{{$d := .Data}}
{{$p := $d.page}}
<section class="hero-section tech-bg pt-32 pb-16">
    <div class="tech-grid"></div>
    <div class="tech-orb"><i></i></div>
    <div class="tech-content max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">{{$p.Title}}</h1>
    </div>
</section>
<section class="py-12 bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <article class="bg-white rounded-xl p-8 md:p-12 border border-gray-200">
            <div class="prose prose-lg max-w-none">{{safeHTML $d.content}}</div>
        </article>
    </div>
</section>
{{end}}
