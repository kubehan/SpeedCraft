{{template "admin_layout" .}}
{{define "admin_content"}}
<div>
    <div class="flex items-center justify-between mb-6">
        <div><h1 class="text-xl font-bold text-slate-900">标签管理</h1><p class="text-sm text-slate-500 mt-0.5">管理博客文章标签</p></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="page-card lg:col-span-1">
            <h2 class="text-base font-semibold text-slate-900 mb-4">添加标签</h2>
            <form method="POST" action="/admin/tags" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
                <div>
                    <label class="form-label">标签名称</label>
                    <input type="text" name="name" required class="form-input" placeholder="例如: Docker, Kubernetes">
                </div>
                <button type="submit" class="btn-primary w-full">添加</button>
            </form>
        </div>
        <div class="page-card lg:col-span-2">
            <h2 class="text-base font-semibold text-slate-900 mb-4">所有标签</h2>
            <div class="flex flex-wrap gap-2">
                {{range $t := .Data}}
                <div class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-sm group">
                    <span>{{$t.Name}}</span>
                    <a href="/admin/tags/delete?id={{$t.ID}}" class="text-indigo-400 hover:text-red-500 text-xs leading-none" onclick="return confirm('确定删除标签「{{$t.Name}}」？')">&times;</a>
                </div>
                {{else}}
                <p class="text-slate-400 text-sm">暂无标签</p>
                {{end}}
            </div>
        </div>
    </div>
</div>
{{end}}
