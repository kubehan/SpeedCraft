{{template "admin_layout" .}}
{{define "admin_content"}}
{{$s := .Data}}
<div class="max-w-3xl">
    <div class="mb-6">
        <a href="/admin/services" class="text-sm text-indigo-600 hover:text-indigo-800">← 返回服务列表</a>
        <h1 class="text-xl font-bold text-slate-900 mt-1">{{if gt $s.ID 0}}编辑服务{{else}}新增服务{{end}}</h1>
    </div>
    <form method="POST" action="/admin/services/save" class="page-card">
        <div class="page-card-body space-y-5">
            {{if gt $s.ID 0}}<input type="hidden" name="id" value="{{$s.ID}}">{{end}}
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="form-label">服务名称 *</label><input type="text" name="title" value="{{$s.Title}}" required class="form-input"></div>
                <div><label class="form-label">图标 (Emoji)</label><input type="text" name="icon" value="{{$s.Icon}}" class="form-input" placeholder="🚀"></div>
            </div>
            <div><label class="form-label">描述 *</label><textarea name="description" required rows="3" class="form-input">{{$s.Description}}</textarea></div>
            <div><label class="form-label">特点 (每行一个)</label><textarea name="features" rows="5" class="form-input font-mono text-sm">{{$s.Features}}</textarea></div>
            <div class="grid md:grid-cols-3 gap-5">
                <div><label class="form-label">定价</label><input type="text" name="pricing" value="{{$s.Pricing}}" class="form-input" placeholder="¥3,000/起"></div>
                <div><label class="form-label">排序</label><input type="number" name="sort_order" value="{{$s.SortOrder}}" class="form-input"></div>
                <div><label class="form-label">发布状态</label><select name="is_published" class="form-input bg-white"><option value="1" {{if eq $s.IsPublished 1}}selected{{end}}>已发布</option><option value="0" {{if eq $s.IsPublished 0}}selected{{end}}>未发布</option></select></div>
            </div>
            <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
                <button type="submit" class="btn-primary">保存</button>
                <a href="/admin/services" class="btn-secondary">取消</a>
            </div>
        </div>
    </form>
</div>
{{end}}
