{{template "admin_layout" .}}
{{define "admin_content"}}
<div>
    <div class="flex items-center justify-between mb-6">
        <div><h1 class="text-xl font-bold text-slate-900">开源项目管理</h1><p class="text-sm text-slate-500 mt-0.5">展示开发能力和开源贡献</p></div>
        <a href="/admin/opensource/edit" class="btn-primary">＋ 新增项目</a>
    </div>
    <div class="page-card">
        <table class="data-table">
            <thead><tr>
                <th>名称</th>
                <th class="w-24">语言</th>
                <th class="w-20">Stars</th>
                <th class="w-20">推荐</th>
                <th class="w-20">状态</th>
                <th class="w-28">操作</th>
            </tr></thead>
            <tbody>
                {{range $p := .Data}}
                <tr>
                    <td class="font-medium text-slate-900"><a href="{{$p.GithubURL}}" target="_blank" class="hover:text-indigo-600">{{$p.Name}}</a></td>
                    <td><span class="badge badge-blue">{{$p.Language}}</span></td>
                    <td class="text-slate-600">⭐ {{$p.Stars}}</td>
                    <td>{{if eq $p.IsFeatured 1}}<span class="text-amber-500 text-lg">★</span>{{else}}-{{end}}</td>
                    <td>{{if eq $p.IsPublished 1}}<span class="badge badge-green">已发布</span>{{else}}<span class="badge badge-gray">未发布</span>{{end}}</td>
                    <td>
                        <div class="flex items-center gap-2">
                            <a href="/admin/opensource/edit?id={{$p.ID}}" class="text-indigo-600 hover:text-indigo-800 text-sm">编辑</a>
                            <a href="/admin/opensource/delete?id={{$p.ID}}" class="text-red-500 hover:text-red-700 text-sm" onclick="return confirm('确定删除？')">删除</a>
                        </div>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
