{{template "admin_layout" .}}
{{define "admin_content"}}
<div>
    <div class="flex items-center justify-between mb-6">
        <div><h1 class="text-xl font-bold text-slate-900">服务管理</h1><p class="text-sm text-slate-500 mt-0.5">管理门户展示的服务列表</p></div>
        <a href="/admin/services/edit" class="btn-primary">＋ 新增服务</a>
    </div>
    <div class="page-card">
        <table class="data-table">
            <thead><tr>
                <th class="w-16">排序</th>
                <th class="w-16">图标</th>
                <th>名称</th>
                <th>定价</th>
                <th class="w-24">状态</th>
                <th class="w-32">操作</th>
            </tr></thead>
            <tbody>
                {{range $s := .Data}}
                <tr>
                    <td class="text-slate-400">{{$s.SortOrder}}</td>
                    <td class="text-xl">{{$s.Icon}}</td>
                    <td class="font-medium text-slate-900">{{$s.Title}}</td>
                    <td class="text-slate-500">{{if $s.Pricing}}{{$s.Pricing}}{{else}}-{{end}}</td>
                    <td>{{if eq $s.IsPublished 1}}<span class="badge badge-green">已发布</span>{{else}}<span class="badge badge-gray">未发布</span>{{end}}</td>
                    <td>
                        <div class="flex items-center gap-2">
                            <a href="/admin/services/edit?id={{$s.ID}}" class="text-indigo-600 hover:text-indigo-800 text-sm">编辑</a>
                            <a href="/admin/services/delete?id={{$s.ID}}" class="text-red-500 hover:text-red-700 text-sm" onclick="return confirm('确定删除？')">删除</a>
                        </div>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
