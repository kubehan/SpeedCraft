{{define "admin_layout"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
    // Force-strip x-cloak after Alpine starts (Alpine sometimes misses elements deep in nested templates)
    document.addEventListener('alpine:initialized', function() {
        document.querySelectorAll('[x-cloak]').forEach(function(el) { el.removeAttribute('x-cloak'); });
    });
    </script>
    <script>
    function togglePublish(table, id, el) {
        var csrfToken = '{{.CSRFToken}}';
        var form = new URLSearchParams();
        form.append('table', table);
        form.append('id', id);
        form.append('csrf_token', csrfToken);
        fetch('/admin/toggle-publish', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: form
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.published === 1) {
                el.className = 'badge badge-green cursor-pointer';
                el.textContent = '已发布';
            } else {
                el.className = 'badge badge-gray cursor-pointer';
                el.textContent = '未发布';
            }
        });
    }
    function batchAction(table, action) {
        var checks = document.querySelectorAll('.batch-check:checked');
        var ids = Array.from(checks).map(function(c) { return c.value; }).join(',');
        if (!ids) { alert('请先选择项目'); return; }
        var msg = action === 'delete' ? '确定删除选中的项目？' : '确定执行批量操作？';
        if (!confirm(msg)) return;
        var form = new URLSearchParams();
        form.append('table', table);
        form.append('action', action);
        form.append('ids', ids);
        form.append('csrf_token', '{{.CSRFToken}}');
        fetch('/admin/batch', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: form
        }).then(function(r) { return r.json(); }).then(function() { location.reload(); });
    }
    function toggleAll(source) {
        document.querySelectorAll('.batch-check').forEach(function(c) { c.checked = source.checked; });
    }
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; color: rgba(255,255,255,0.6); transition: all 0.15s; }
        .sidebar-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .sidebar-link.active { background: rgba(99,102,241,0.2); color: #818cf8; }
        .page-card { background: #fff; border-radius: 0.75rem; border: 1px solid #f1f5f9; overflow: hidden; }
        .page-card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .page-card-body { padding: 1.5rem; }
        .btn-primary { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; background: #6366f1; color: #fff; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; transition: all 0.15s; }
        .btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .btn-secondary { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; background: #fff; color: #475569; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; border: 1px solid #e2e8f0; transition: all 0.15s; }
        .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-danger { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; background: #ef4444; color: #fff; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; transition: all 0.15s; }
        .btn-danger:hover { background: #dc2626; }
        .form-input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.15s; }
        .form-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-label { display: block; font-size: 0.8125rem; font-weight: 500; color: #374151; margin-bottom: 0.375rem; }
        .badge { display: inline-flex; align-items: center; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-green { background: #dcfce7; color: #16a34a; }
        .badge-yellow { background: #fef9c3; color: #ca8a04; }
        .badge-blue { background: #dbeafe; color: #2563eb; }
        .badge-gray { background: #f1f5f9; color: #64748b; }
        .badge-purple { background: #f3e8ff; color: #9333ea; }
        input[type="checkbox"].batch-toggle { width: 1rem; height: 1rem; border-radius: 0.25rem; border: 1px solid #cbd5e1; cursor: pointer; accent-color: #6366f1; }
        table.data-table { width: 100%; font-size: 0.875rem; }
        table.data-table thead { background: #f8fafc; }
        table.data-table th { text-align: left; padding: 0.75rem 1rem; font-weight: 500; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; }
        table.data-table td { padding: 0.75rem 1rem; border-bottom: 1px solid #f8fafc; }
        table.data-table tbody tr { transition: background 0.15s; }
        table.data-table tbody tr:hover { background: #f8fafc; }
        .stat-card { background: #fff; border-radius: 0.75rem; border: 1px solid #f1f5f9; padding: 1.25rem; }
        .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .gradient-brand { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-60 bg-slate-900 flex flex-col flex-shrink-0">
            <div class="h-16 flex items-center px-5 border-b border-slate-800">
                <a href="/admin" class="flex items-center space-x-2.5">
                    <span class="text-xl">⚡</span>
                    <span class="font-bold text-white text-sm">速创社 管理后台</span>
                </a>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">
                {{$current := .Current}}
                {{range $item := adminSidebar}}
                <a href="{{$item.URL}}" class="sidebar-link {{if eq $current $item.Key}}active{{end}}">
                    <span class="text-base w-5 text-center">{{$item.Icon}}</span>
                    <span>{{$item.Label}}</span>
                </a>
                {{end}}
            </nav>
            <div class="p-3 border-t border-slate-800 space-y-1">
                <a href="/" target="_blank" class="sidebar-link">
                    <span class="text-base w-5 text-center">🌐</span>
                    <span>查看网站</span>
                </a>
                <a href="/admin/logout" class="sidebar-link hover:!text-red-400">
                    <span class="text-base w-5 text-center">🚪</span>
                    <span>退出登录</span>
                </a>
            </div>
        </aside>

        <!-- Main -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Top header -->
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0">
                <div class="flex items-center gap-3 text-sm text-slate-500">
                    <span class="font-medium text-slate-900">{{.Title}}</span>
                </div>
                <div class="flex items-center gap-4 text-sm text-slate-500">
                    <span class="hidden sm:inline">管理员</span>
                    <span class="w-7 h-7 rounded-full gradient-brand flex items-center justify-center text-white text-xs font-bold">A</span>
                </div>
            </header>

            <!-- Content -->
            <main class="flex-1 overflow-y-auto p-6">
                {{template "admin_content" .}}
            </main>
        </div>
    </div>
</body>
</html>
{{end}}
