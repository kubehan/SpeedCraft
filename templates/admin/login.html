<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: all 0.15s; }
        .login-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl gradient-bg flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/20">
                <span class="text-2xl">⚡</span>
            </div>
            <h1 class="text-xl font-bold text-slate-900">速创社 管理后台</h1>
            <p class="text-sm text-slate-500 mt-1">请登录以继续</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            {{$data := .Data}}
            {{if $data.error}}
            <div class="mb-4 p-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600 text-center">
                {{$data.error}}
            </div>
            {{end}}

            <form method="POST" action="/admin/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">用户名</label>
                    <input type="text" name="username" required class="login-input" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
                    <input type="password" name="password" required class="login-input" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="w-full py-2.5 text-white font-medium gradient-bg rounded-lg hover:shadow-lg hover:shadow-indigo-500/25 transition-all duration-200 text-sm">
                    登录
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-slate-100 text-center">
                <a href="/" class="text-sm text-slate-400 hover:text-slate-600 transition-colors">
                    ← 返回首页
                </a>
            </div>
        </div>
    </div>
</body>
</html>
