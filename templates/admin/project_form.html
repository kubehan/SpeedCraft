{{template "admin_layout" .}}
{{define "admin_content"}}
{{$p := .Data}}
<div class="max-w-3xl">
    <div class="mb-6">
        <a href="/admin/projects" class="text-sm text-indigo-600 hover:text-indigo-800">← 返回项目列表</a>
        <h1 class="text-xl font-bold text-slate-900 mt-1">{{if gt $p.ID 0}}编辑项目{{else}}新增项目{{end}}</h1>
    </div>
    <form method="POST" action="/admin/projects/save" class="page-card"
      x-data="{ showImagePicker: false, images: [], pickerTarget: '', openImagePicker(tid) { this.pickerTarget = tid; this.showImagePicker = true; this.images = []; fetch('/admin/upload?list=json').then(r=>r.json()).then(d=>{ this.images = d; }); }, selectImage(url) { document.getElementById(this.pickerTarget).value = url; this.showImagePicker = false; } }">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="page-card-body space-y-5">
            {{if gt $p.ID 0}}<input type="hidden" name="id" value="{{$p.ID}}">{{end}}
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="form-label">项目名称 *</label><input type="text" name="title" value="{{$p.Title}}" required class="form-input"></div>
                <div><label class="form-label">链接别名</label><input type="text" name="slug" value="{{$p.Slug}}" class="form-input"></div>
            </div>
            <div><label class="form-label">摘要</label><textarea name="summary" rows="3" class="form-input">{{$p.Summary}}</textarea></div>
            <div><label class="form-label">内容 (HTML)</label><textarea name="content" rows="15" class="form-input font-mono text-sm">{{$p.Content}}</textarea></div>
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="form-label">分类</label><input type="text" name="category" value="{{$p.Category}}" class="form-input" placeholder="Kubernetes"></div>
                <div><label class="form-label">技术栈 (逗号分隔)</label><input type="text" name="tech_stack" value="{{$p.TechStack}}" class="form-input" placeholder="Docker,Kubernetes,Terraform"></div>
            </div>
            <div class="grid md:grid-cols-3 gap-5">
                <div><label class="form-label">客户名称</label><input type="text" name="client_name" value="{{$p.ClientName}}" class="form-input"></div>
                <div><label class="form-label">客户链接</label><input type="text" name="client_url" value="{{$p.ClientURL}}" class="form-input"></div>
                <div>
                    <label class="form-label">封面图片</label>
                    <div class="flex gap-2">
                        <input type="text" name="image_url" id="image_url" value="{{$p.ImageURL}}" class="form-input flex-1" placeholder="/static/uploads/xxx.png">
                        <button type="button" @click="openImagePicker('image_url')" class="btn-secondary text-sm whitespace-nowrap">选择</button>
                    </div>
                </div>
            </div>
            <div><label class="form-label">发布状态</label><select name="is_published" class="form-input bg-white w-auto"><option value="0" {{if eq $p.IsPublished 0}}selected{{end}}>未发布</option><option value="1" {{if eq $p.IsPublished 1}}selected{{end}}>已发布</option></select></div>
            <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
                <button type="submit" class="btn-primary">保存</button>
                <a href="/admin/projects" class="btn-secondary">取消</a>
            </div>
        </div>
    </form>

    <!-- Image picker modal (reused) -->
    <div x-show="showImagePicker" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @click.self="showImagePicker = false">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col">
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200">
                <h3 class="text-base font-semibold text-slate-900">选择图片</h3>
                <button @click="showImagePicker = false" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div class="grid grid-cols-4 gap-3" x-show="images.length > 0">
                    <template x-for="img in images" :key="img.name">
                        <div class="group relative aspect-square rounded-lg overflow-hidden border border-slate-200 cursor-pointer hover:border-indigo-400 transition-colors"
                             @click="selectImage(img.url)">
                            <img :src="img.url" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors flex items-center justify-center">
                                <span class="text-white text-xs opacity-0 group-hover:opacity-100 transition-opacity">选择</span>
                            </div>
                        </div>
                    </template>
                </div>
                <div x-show="images.length === 0" class="text-center text-slate-400 py-8 text-sm">暂无图片</div>
            </div>
        </div>
    </div>
</div>
{{end}}
