{{template "admin_layout" .}}
{{define "admin_content"}}
{{$p := .Data}}
<div class="max-w-5xl">
    <div class="mb-6">
        <a href="/admin/posts" class="text-sm text-indigo-600 hover:text-indigo-800">← 返回文章列表</a>
        <h1 class="text-xl font-bold text-slate-900 mt-1">{{if gt $p.ID 0}}编辑文章{{else}}写文章{{end}}</h1>
    </div>
    <form method="POST" action="/admin/posts/save" class="space-y-5" x-data="postEditor()">
        {{if gt $p.ID 0}}<input type="hidden" name="id" value="{{$p.ID}}">{{end}}
        <div class="page-card">
            <div class="page-card-body space-y-5">
                <div class="grid md:grid-cols-3 gap-5">
                    <div class="md:col-span-2"><label class="form-label">标题 *</label><input type="text" name="title" value="{{$p.Title}}" required x-model="title" @input.debounce="slugifyTitle" class="form-input"></div>
                    <div><label class="form-label">链接别名 (slug)</label><input type="text" name="slug" value="{{$p.Slug}}" x-model="slug" class="form-input"></div>
                </div>
                <div><label class="form-label">摘要</label><textarea name="summary" rows="2" class="form-input">{{$p.Summary}}</textarea></div>
            </div>
        </div>
        <div class="page-card">
            <div class="page-card-header">
                <span class="text-sm font-medium text-slate-700">内容</span>
                <div class="flex items-center gap-3">
                    <select name="content_type" x-model="contentType" class="form-input w-auto bg-white py-1.5"><option value="markdown" {{if eq $p.ContentType "markdown"}}selected{{end}}>Markdown</option><option value="html" {{if eq $p.ContentType "html"}}selected{{end}}>HTML</option></select>
                    <button type="button" @click="preview" class="btn-secondary text-sm">预览</button>
                </div>
            </div>
            <div class="page-card-body">
                <textarea name="content" rows="20" x-model="content" class="form-input font-mono text-sm">{{$p.Content}}</textarea>
            </div>
        </div>
        <div x-show="showPreview" x-cloak class="page-card">
            <div class="page-card-body">
                <h3 class="text-sm font-medium text-slate-700 mb-3">预览</h3>
                <div class="prose prose-sm max-w-none" x-html="previewHTML"></div>
            </div>
        </div>
        <div class="page-card">
            <div class="page-card-body space-y-5">
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="form-label">标签 (逗号分隔)</label><input type="text" name="tags" value="{{$p.Tags}}" class="form-input" placeholder="Kubernetes,运维,DevOps"></div>
                    <div><label class="form-label">发布状态</label><select name="is_published" class="form-input bg-white"><option value="0" {{if eq $p.IsPublished 0}}selected{{end}}>草稿</option><option value="1" {{if eq $p.IsPublished 1}}selected{{end}}>发布</option></select></div>
                </div>
                <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
                    <button type="submit" class="btn-primary">保存</button>
                    <a href="/admin/posts" class="btn-secondary">取消</a>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function postEditor() {
        return {
            title: '{{$p.Title}}',
            slug: '{{$p.Slug}}',
            content: {{$p.Content}},
            contentType: '{{$p.ContentType}}',
            showPreview: false,
            previewHTML: '',
            slugifyTitle() {
                if (!this.slug || this.slug === '{{$p.Slug}}') {
                    this.slug = this.title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-').replace(/^-|-$/g, '');
                }
            },
            async preview() {
                if (this.contentType === 'html') { this.previewHTML = this.content; this.showPreview = true; return; }
                const res = await fetch('/admin/preview', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: 'content=' + encodeURIComponent(this.content) });
                this.previewHTML = await res.text();
                this.showPreview = true;
            }
        }
    }
</script>
{{end}}
