{{template "admin_layout" .}}
{{define "admin_content"}}
{{$p := .Data}}
<div class="max-w-3xl">
    <div class="mb-6">
        <a href="/admin/opensource" class="text-sm text-indigo-600 hover:text-indigo-800">← 返回列表</a>
        <h1 class="text-xl font-bold text-slate-900 mt-1">{{if gt $p.ID 0}}编辑开源项目{{else}}新增开源项目{{end}}</h1>
    </div>
    <form method="POST" action="/admin/opensource/save" class="page-card">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="page-card-body space-y-5">
            {{if gt $p.ID 0}}<input type="hidden" name="id" value="{{$p.ID}}">{{end}}
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="form-label">项目名称 *</label><input type="text" name="name" value="{{$p.Name}}" required class="form-input"></div>
                <div><label class="form-label">开发语言</label><input type="text" name="language" value="{{$p.Language}}" class="form-input" placeholder="Go"></div>
            </div>
            <div><label class="form-label">描述</label><textarea name="description" rows="3" class="form-input">{{$p.Description}}</textarea></div>
            <div class="grid md:grid-cols-2 gap-5">
                <div><label class="form-label">项目链接</label><input type="text" name="url" value="{{$p.URL}}" class="form-input"></div>
                <div><label class="form-label">GitHub 链接</label><input type="text" name="github_url" value="{{$p.GithubURL}}" class="form-input"></div>
            </div>
            <div class="grid md:grid-cols-4 gap-5">
                <div><label class="form-label">Stars</label><input type="number" name="stars" value="{{$p.Stars}}" class="form-input"></div>
                <div><label class="form-label">许可证</label><input type="text" name="license_type" value="{{$p.LicenseType}}" class="form-input" placeholder="MIT"></div>
                <div><label class="form-label">排序</label><input type="number" name="sort_order" value="{{$p.SortOrder}}" class="form-input"></div>
                <div><label class="form-label">推荐项目</label><select name="is_featured" class="form-input bg-white"><option value="0" {{if eq $p.IsFeatured 0}}selected{{end}}>否</option><option value="1" {{if eq $p.IsFeatured 1}}selected{{end}}>是</option></select></div>
            </div>
            <div><label class="form-label">发布状态</label><select name="is_published" class="form-input bg-white w-auto"><option value="1" {{if eq $p.IsPublished 1}}selected{{end}}>已发布</option><option value="0" {{if eq $p.IsPublished 0}}selected{{end}}>未发布</option></select></div>
            <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
                <button type="submit" class="btn-primary">保存</button>
                <a href="/admin/opensource" class="btn-secondary">取消</a>
            </div>
        </div>
    </form>
</div>
{{end}}
