{{template "admin_layout" .}}
{{define "admin_content"}}
{{$s := .Data}}
<div class="max-w-4xl">
    <div class="mb-6">
        <h1 class="text-xl font-bold text-slate-900">站点设置</h1>
        <p class="text-sm text-slate-500 mt-0.5">配置站点基本信息、展示文案和通知方式</p>
    </div>
    <form method="POST" action="/admin/settings/save" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="page-card">
            <div class="page-card-header"><span class="text-sm font-medium text-slate-700">基本信息</span></div>
            <div class="page-card-body space-y-5">
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="form-label">站点名称</label><input type="text" name="site_name" value='{{index $s "site_name"}}' class="form-input"></div>
                    <div><label class="form-label">站点描述</label><input type="text" name="site_description" value='{{index $s "site_description"}}' class="form-input"></div>
                </div>
                <div><label class="form-label">站点关键词 (SEO)</label><input type="text" name="site_keywords" value='{{index $s "site_keywords"}}' class="form-input"></div>
            </div>
        </div>

        <div class="page-card">
            <div class="page-card-header"><span class="text-sm font-medium text-slate-700">主题配色</span></div>
            <div class="page-card-body">
                {{$current := index $s "theme_preset"}}
                {{if eq $current ""}}{{$current = "indigo"}}{{end}}
                <p class="text-xs text-slate-500 mb-4">选择网站整体配色风格，保存后立即生效</p>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    {{range $t := themePresets}}
                    <label class="cursor-pointer">
                        <input type="radio" name="theme_preset" value="{{$t.Key}}" {{if eq $current $t.Key}}checked{{end}} class="peer sr-only">
                        <div class="border-2 border-slate-200 rounded-lg p-3 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 hover:border-slate-300 transition-colors">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="w-5 h-5 rounded-full" style="background-color: {{$t.Color}}"></span>
                                <span class="w-3 h-3 rounded-full opacity-60" style="background-color: {{$t.Color}}"></span>
                                <span class="w-2 h-2 rounded-full opacity-30" style="background-color: {{$t.Color}}"></span>
                            </div>
                            <div class="text-sm font-medium text-slate-900">{{$t.Label}}</div>
                            <div class="text-xs text-slate-500">{{$t.Desc}}</div>
                        </div>
                    </label>
                    {{end}}
                </div>
            </div>
        </div>

        <div class="page-card">
            <div class="page-card-header"><span class="text-sm font-medium text-slate-700">首页展示</span></div>
            <div class="page-card-body space-y-5">
                <div><label class="form-label">Hero 标题</label><input type="text" name="hero_title" value='{{index $s "hero_title"}}' class="form-input"></div>
                <div><label class="form-label">Hero 副标题</label><textarea name="hero_subtitle" rows="2" class="form-input">{{index $s "hero_subtitle"}}</textarea></div>
                <div><label class="form-label">Hero 标签文案</label><input type="text" name="hero_badge" value='{{index $s "hero_badge"}}' class="form-input"></div>
                <div><label class="form-label">理念标题</label><input type="text" name="philosophy_title" value='{{index $s "philosophy_title"}}' class="form-input"></div>
                <div><label class="form-label">理念描述</label><textarea name="philosophy_desc" rows="2" class="form-input">{{index $s "philosophy_desc"}}</textarea></div>
                <div><label class="form-label">关于我 (HTML)</label><textarea name="about_me" rows="6" class="form-input font-mono text-sm">{{index $s "about_me"}}</textarea></div>
            </div>
        </div>

        <div class="page-card">
            <div class="page-card-header"><span class="text-sm font-medium text-slate-700">数据统计</span></div>
            <div class="page-card-body">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div><label class="form-label">数值</label><input type="text" name="stats_years" value='{{index $s "stats_years"}}' class="form-input"></div>
                    <div><label class="form-label">标签</label><input type="text" name="stats_years_label" value='{{index $s "stats_years_label"}}' class="form-input"></div>
                    <div><label class="form-label">数值</label><input type="text" name="stats_projects" value='{{index $s "stats_projects"}}' class="form-input"></div>
                    <div><label class="form-label">标签</label><input type="text" name="stats_projects_label" value='{{index $s "stats_projects_label"}}' class="form-input"></div>
                    <div><label class="form-label">数值</label><input type="text" name="stats_uptime" value='{{index $s "stats_uptime"}}' class="form-input"></div>
                    <div><label class="form-label">标签</label><input type="text" name="stats_uptime_label" value='{{index $s "stats_uptime_label"}}' class="form-input"></div>
                    <div><label class="form-label">数值</label><input type="text" name="stats_response" value='{{index $s "stats_response"}}' class="form-input"></div>
                    <div><label class="form-label">标签</label><input type="text" name="stats_response_label" value='{{index $s "stats_response_label"}}' class="form-input"></div>
                </div>
            </div>
        </div>

        <div class="page-card">
            <div class="page-card-header"><span class="text-sm font-medium text-slate-700">联系方式 & 通知</span></div>
            <div class="page-card-body space-y-5">
                <div class="grid md:grid-cols-2 gap-5">
                    <div><label class="form-label">联系邮箱</label><input type="text" name="contact_email" value='{{index $s "contact_email"}}' class="form-input"></div>
                    <div><label class="form-label">微信号</label><input type="text" name="contact_wechat" value='{{index $s "contact_wechat"}}' class="form-input"></div>
                </div>
                <div class="border-t border-slate-100 pt-5">
                    <h3 class="text-sm font-medium text-slate-700 mb-4">新留言通知设置</h3>
                    <div class="grid md:grid-cols-2 gap-5 mb-4">
                        <div><label class="form-label">企业微信机器人 Webhook</label><input type="text" name="wechat_webhook" value='{{index $s "wechat_webhook"}}' class="form-input" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/..."></div>
                        <div><label class="form-label">通知邮箱</label><input type="text" name="notify_email" value='{{index $s "notify_email"}}' class="form-input"></div>
                    </div>
                    <div class="grid md:grid-cols-4 gap-4">
                        <div><label class="form-label">SMTP 主机</label><input type="text" name="smtp_host" value='{{index $s "smtp_host"}}' class="form-input"></div>
                        <div><label class="form-label">端口</label><input type="text" name="smtp_port" value='{{index $s "smtp_port"}}' class="form-input"></div>
                        <div><label class="form-label">用户名</label><input type="text" name="smtp_user" value='{{index $s "smtp_user"}}' class="form-input"></div>
                        <div><label class="form-label">密码</label><input type="password" name="smtp_pass" value='{{index $s "smtp_pass"}}' class="form-input"></div>
                    </div>
                    <div class="mt-4" x-data="{ testing: false, result: '', testNotify() { this.testing = true; this.result = ''; var f = new URLSearchParams(); f.append('csrf_token', '{{.CSRFToken}}'); fetch('/admin/test-notification', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: f }).then(r=>r.json()).then(d => { this.testing = false; this.result = d.success ? '✅ 测试通知已发送' : '❌ ' + (d.error || '发送失败'); }).catch(() => { this.testing = false; this.result = '❌ 请求失败'; }); } }">
                        <button type="button" @click="testNotify" class="btn-secondary text-sm" :disabled="testing">
                            <span x-show="!testing">📨 发送测试通知</span>
                            <span x-show="testing" class="animate-pulse">发送中...</span>
                        </button>
                        <span x-show="result" x-text="result" :class="result.includes('失败')||result.includes('请先配置') ? 'text-red-500' : 'text-green-500'" class="ml-3 text-sm"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button type="submit" class="btn-primary">保存所有设置</button>
        </div>
    </form>
</div>
{{end}}
